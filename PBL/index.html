<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderLust | AI Holiday Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Theme Toggle -->
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">
        🌙
    </button>

    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="container">
        <!-- Hero Section -->
        <section class="hero">
            <h1 class="gradient-text">Plan Your Dream Trip</h1>
            <p>AI-powered itineraries, real-time flights & hotels in seconds.</p>
        </section>

        <!-- Input Form -->
        <section class="glass-card form-container">
            <form id="planner-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="source">Source (Airport Code/City)</label>
                        <input type="text" id="source" name="source" placeholder="e.g. DEL or New Delhi" required>
                    </div>
                    <div class="input-group">
                        <label for="destination">Destination (Airport Code/City)</label>
                        <input type="text" id="destination" name="destination" placeholder="e.g. BOM or Mumbai" required>
                    </div>
                    <div class="input-group">
                        <label for="departure-date">Departure Date</label>
                        <input type="date" id="departure-date" name="departure_date" required>
                    </div>
                    <div class="input-group">
                        <label for="return-date">Return Date (Optional)</label>
                        <input type="date" id="return-date" name="return_date">
                    </div>
                    <div class="input-group">
                        <label for="budget">Budget (INR)</label>
                        <input type="number" id="budget" name="budget" placeholder="e.g. 50000" required>
                    </div>
                    <div class="input-group">
                        <label for="interests">Interests</label>
                        <input type="text" id="interests" name="interests" placeholder="e.g. Adventure, Food, Culture" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary" id="plan-btn">
                    <span>Plan Trip ✨</span>
                    <div class="spinner hidden" id="btn-spinner"></div>
                </button>
            </form>
        </section>

        <!-- Loading State -->
        <section id="loading-state" class="hidden glass-card text-center">
            <div class="loader"></div>
            <h3>Generating your perfect holiday...</h3>
            <p>Fetching the best flights, hotels, and experiences!</p>
        </section>

        <!-- Results Section -->
        <section id="results-section" class="hidden">
            <div class="tabs-container">
                <div class="tabs glass-card">
                    <button class="tab-btn active" data-target="itinerary-tab">📍 AI Itinerary</button>
                    <button class="tab-btn" data-target="flights-tab">✈️ Flights</button>
                    <button class="tab-btn" data-target="hotels-tab">🏨 Hotels</button>
                </div>
                <button id="regenerate-btn" class="btn-secondary">Regenerate Plan</button>
            </div>

            <div class="tab-content glass-card active" id="itinerary-tab">
                <h2>Your AI Itinerary & Top Places</h2>
                <div id="itinerary-results"></div>
            </div>

            <div class="tab-content glass-card" id="flights-tab">
                <h2>Available Flights</h2>
                <div id="flights-results" class="results-grid list-view"></div>
            </div>

            <div class="tab-content glass-card" id="hotels-tab">
                <h2>Recommended Hotels</h2>
                <div id="hotels-results" class="results-grid"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
